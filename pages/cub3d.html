<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cub3D | portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .container {
            text-align: center;
        }

        .title {
            font-size: 48px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeIn 1s ease forwards;
        }

        .desc {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.1em;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeIn 1s ease 0.3s forwards;
        }

        .redirect-link {
            display: inline-block;
            padding: 12px 32px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeIn 1s ease 0.6s forwards;
        }

        .redirect-link:hover {
            color: #fff;
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
        }

        .countdown {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 20px;
            opacity: 0;
            animation: fadeIn 1s ease 0.9s forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 class="title">Cub3D</h1>
        <p class="desc">3D Renderer • WebGPU • C</p>
        <a href="https://github.com/JacquesNethow/Cub3D" target="_blank" class="redirect-link">
            Ver no GitHub ↗
        </a>
        <p class="countdown">Redirecionando em <span id="countdown">5</span>s</p>
    </div>
    <script>
        let count = 5;
        const countdownEl = document.getElementById('countdown');

        const interval = setInterval(() => {
            count--;
            countdownEl.textContent = count;

            if (count <= 0) {
                clearInterval(interval);
                window.location.href = 'https://github.com/JacquesNethow/Cub3D';
            }
        }, 1000);
    </script>
</body>

</html>
